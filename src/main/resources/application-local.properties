# In-memory H2 for local dev when remote MySQL is unreachable.
# Run: mvn spring-boot:run -Dspring-boot.run.arguments=--spring.profiles.active=local
# Schema still auto-updates (ddl-auto=update) — but only inside this H2 database, not on your remote MySQL.

spring.datasource.url=jdbc:h2:mem:skinme;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Google OAuth2 / login-with-Google: not defined here — uses spring.security.oauth2.client.registration.google.* from application.properties only.
