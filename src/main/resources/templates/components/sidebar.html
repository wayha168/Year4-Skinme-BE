<script>
  (function () {
    function clearMenuHash() {
      var hash = window.location.hash || '';
      // Clear #deliveryMenu, #chatMenu, or bare #
      if (hash === '#' || /^#(stock|order|delivery|user|chat|apiConfig)Menu$/.test(hash)) {
        history.replaceState(null, '', window.location.pathname + window.location.search);
      }
    }

    function highlightActiveNav() {
      var sidebarNav = document.getElementById('sidebar-nav');
      if (!sidebarNav) return;
      var path = (window.location.pathname || '').replace(/\/+$/, '') || '/';
      var bestLink = null;
      var bestLen = -1;
      sidebarNav.querySelectorAll('a.nav-link[href]').forEach(function (link) {
        var href = link.getAttribute('href');
        if (!href || href === '#' || href.charAt(0) === '#') return;
        var linkPath = href;
        try {
          linkPath = new URL(href, window.location.origin).pathname.replace(/\/+$/, '') || '/';
        } catch (err) {}
        if (path === linkPath || (linkPath !== '/' && path.indexOf(linkPath) === 0)) {
          if (linkPath.length > bestLen) {
            bestLen = linkPath.length;
            bestLink = link;
          }
        }
      });
      if (!bestLink) return;
      bestLink.classList.add('active');
      var parentCollapse = bestLink.closest('.collapse');
      if (parentCollapse) {
        var toggle = sidebarNav.querySelector('[aria-controls="' + parentCollapse.id + '"]');
        if (toggle) {
          toggle.classList.add('is-section-active');
          toggle.setAttribute('aria-expanded', 'true');
        }
        parentCollapse.classList.add('show');
      }
    }

    /**
     * Sidebar dropdowns are pure Bootstrap collapse:
     * - click = open, click again = close (data-bs-toggle="collapse")
     * - only one open at a time (data-bs-parent="#sidebar-nav")
     * Document-level listener survives Turbo Drive navigation (body is
     * replaced on navigate, so per-element listeners would be lost).
     */
    function initSidebarDropdowns() {
      if (window.__skinmeSidebarCollapseInit) return;
      window.__skinmeSidebarCollapseInit = true;
      document.addEventListener('shown.bs.collapse', function (e) {
        var nav = document.getElementById('sidebar-nav');
        if (!nav || !e.target || !nav.contains(e.target)) return;
        var toggle = nav.querySelector('[aria-controls="' + e.target.id + '"]');
        if (toggle) {
          setTimeout(function () {
            toggle.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
          }, 30);
        }
      });
    }

    function initSidebarChrome() {
      var STORAGE_KEY = 'skinme-sidebar-collapsed';
      var SIDEBAR_COLLAPSED_CLASS = 'sidebar-collapsed';
      var CONTAINER_COLLAPSED_CLASS = 'sidebar-container-collapsed';
      var MOBILE_OPEN_CLASS = 'sidebar-mobile-open';
      var sidebar = document.getElementById('sidebar');
      var container = document.getElementById('appSidebar');
      var btn = document.getElementById('sidebarToggle');
      var mobileBtn = document.getElementById('btnMobileMenu');
      var overlay = document.getElementById('sidebarOverlay');
      var shell = document.getElementById('appShell');

      function isCollapsed() {
        return sidebar && sidebar.classList.contains(SIDEBAR_COLLAPSED_CLASS);
      }
      function setCollapsed(collapsed) {
        if (!sidebar || !container) return;
        sidebar.classList.toggle(SIDEBAR_COLLAPSED_CLASS, collapsed);
        container.classList.toggle(CONTAINER_COLLAPSED_CLASS, collapsed);
        if (btn) {
          btn.setAttribute('aria-label', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
          btn.setAttribute('title', collapsed ? 'Expand sidebar' : 'Collapse sidebar');
          var icon = btn.querySelector('.sidebar-toggle-icon');
          if (icon) icon.classList.toggle('sidebar-toggle-icon-rotated', collapsed);
        }
        try { localStorage.setItem(STORAGE_KEY, collapsed ? '1' : '0'); } catch (e) {}
      }
      function isMobile() {
        return window.matchMedia('(max-width: 991.98px)').matches;
      }
      function openMobile() { if (shell) shell.classList.add(MOBILE_OPEN_CLASS); }
      function closeMobile() { if (shell) shell.classList.remove(MOBILE_OPEN_CLASS); }

      try {
        if (localStorage.getItem(STORAGE_KEY) === '1') setCollapsed(true);
      } catch (e) {}

      if (btn && btn.dataset.toggleReady !== '1') {
        btn.dataset.toggleReady = '1';
        btn.addEventListener('click', function () { setCollapsed(!isCollapsed()); });
      }
      if (mobileBtn && mobileBtn.dataset.mobileReady !== '1') {
        mobileBtn.dataset.mobileReady = '1';
        mobileBtn.addEventListener('click', openMobile);
      }
      if (overlay && overlay.dataset.mobileReady !== '1') {
        overlay.dataset.mobileReady = '1';
        overlay.addEventListener('click', closeMobile);
      }
      if (mobileBtn) mobileBtn.style.display = isMobile() ? 'flex' : 'none';
      if (!isMobile() && shell) shell.classList.remove(MOBILE_OPEN_CLASS);
      window.addEventListener('resize', function () {
        if (mobileBtn) mobileBtn.style.display = isMobile() ? 'flex' : 'none';
        if (!isMobile() && shell) shell.classList.remove(MOBILE_OPEN_CLASS);
      });

      if (sidebar && sidebar.dataset.navCloseReady !== '1') {
        sidebar.dataset.navCloseReady = '1';
        sidebar.addEventListener('click', function (e) {
          if (!isMobile()) return;
          var link = e.target.closest('a.nav-link');
          var href = link && link.getAttribute('href');
          if (href && href !== '#' && href.indexOf('#') !== 0) closeMobile();
        });
      }
    }

    function boot() {
      clearMenuHash();
      highlightActiveNav();
      initSidebarDropdowns();
      initSidebarChrome();
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', boot);
    } else {
      boot();
    }
  })();
</script>
