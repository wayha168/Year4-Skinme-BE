<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" th:replace="~{app :: layout(~{::main}, ~{::style}, ~{::scripts})}">

<head>
  <th:block th:fragment="style">
    <link rel="stylesheet" href="/css/common.css" />
    <link rel="stylesheet" href="/css/tables.css" />
    <link rel="stylesheet" href="/css/badges.css" />
    <style>
      .search-order {
        display: flex;
        justify-content: flex-end;
        margin-bottom: 1rem;
        width: 100%;
      }
      .search-order .input-group {
        display: flex;
        width: 32rem;
        max-width: 100%;
      }
      .search-order .form-control {
        flex: 1;
        min-width: 0;
      }
      .search-order .btn {
        flex-shrink: 0;
      }
      @media (max-width: 576px) {
        .search-order .input-group {
          width: 100%;
        }
      }
    </style>
  </th:block>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title th:text="${pageTitle ?: 'User Orders'}">User Orders</title>
</head>

<body>
  <th:block th:fragment="main">
    <div class="main-content">
      <div th:replace="~{components/page-header :: page-header}" th:with="pageIcon='bi-bag-check'"></div>

      <div class="container-fluid px-4">
        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
          <i class="bi bi-exclamation-circle"></i> <span th:text="${error}"></span>
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-value" th:text="${totalOrders ?: 0}">0</div>
            <div class="stat-label">Total Orders</div>
          </div>
          <div class="stat-card">
            <div class="stat-value" th:text="${deliveredOrders ?: 0}">0</div>
            <div class="stat-label">Delivered</div>
          </div>
        </div>

        <div th:if="${#lists.isEmpty(orders)}" class="card mt-4">
          <div class="empty-state">
            <i class="bi bi-inbox"></i>
            <h5>No User Orders Yet</h5>
            <p>There are no user orders recorded.</p>
            <a href="/" class="btn btn-gradient mt-3"> <i class="bi bi-shop"></i> Go to Shop </a>
          </div>
        </div>

        <div class="search-order">
          <div class="input-group">
            <input type="text" class="form-control" placeholder="Search by order ID or user name..."
              id="orderSearchInput" />
            <button class="btn btn-primary" type="button">
              <i class="bi bi-search"></i>
            </button>
          </div>
        </div>

        <div th:unless="${#lists.isEmpty(orders)}" class="data-table mt-4">
          <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
              <thead>
                <tr>
                  <th style="width: 100px;">#</th>
                  <th><i class="bi bi-person"></i> User</th>
                  <th><i class="bi bi-calendar"></i> Order Date</th>
                  <th style="width: 140px;"><i class="bi bi-currency-dollar"></i> Total Amount</th>
                  <th style="width: 120px;"><i class="bi bi-tags"></i> Status</th>
                  <th><i class="bi bi-geo-alt"></i> Delivery Address</th>
                  <th style="width: 120px;"><i class="bi bi-gear"></i> Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="order : ${orders}">
                  <td class="text-muted fw-semibold" th:text="'#' + ${order.orderId}">#1</td>
                  <td>
                    <span class="text-dark"
                      th:text="${order.userName != null && !order.userName.isBlank() ? order.userName : order.userEmail}">User</span>
                    <br><small class="text-muted" th:text="${order.userEmail}">email</small>
                  </td>
                  <td>
                    <span class="text-dark"
                      th:text="${order.orderDate != null ? #temporals.format(order.orderDate, 'MMM dd, yyyy') : 'N/A'}">Date</span>
                  </td>
                  <td>
                    <span class="fw-bold price-badge text-success"
                      th:text="'$' + ${#numbers.formatDecimal(order.totalAmount != null ? order.totalAmount : 0, 1, 2)}">$0.00</span>
                  </td>
                  <td>
                    <span
                      th:if="${order.orderStatus != null and (order.orderStatus.toString() == 'COMPLETED' or order.orderStatus.toString() == 'DELIVERED')}"
                      class="status-badge-active">
                      <i class="bi bi-check-circle-fill"></i> <span th:text="${order.orderStatus}">COMPLETED</span>
                    </span>
                    <span
                      th:if="${order.orderStatus == null or (order.orderStatus.toString() != 'COMPLETED' and order.orderStatus.toString() != 'DELIVERED')}"
                      class="status-badge-inactive"
                      th:text="${order.orderStatus != null ? order.orderStatus : 'PENDING'}">PENDING</span>
                  </td>
                  <td>
                    <span th:if="${order.deliveryAddressFull != null && !order.deliveryAddressFull.isEmpty()}"
                      th:text="${order.deliveryAddressFull}">Address</span>
                    <span th:if="${order.deliveryAddressFull == null || order.deliveryAddressFull.isEmpty()}"
                      class="text-muted">—</span>
                  </td>
                  <td>
                    <div class="table-actions">
                      <a th:href="'/view/orders/' + ${order.orderId}" class="btn-action" title="View Details">
                        <i class="bi bi-eye"></i>
                      </a>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

        <!-- Pagination -->
        <div th:if="${totalPages > 1}"
          th:replace="~{components/pagination :: pagination('/views/my-orders', ${currentPage}, ${totalPages}, ${hasNext}, ${hasPrev})}">
        </div>

        <div class="mt-4 text-center mb-5">
          <p class="text-muted" th:text="'Total User Orders: ' + ${totalOrders ?: 0}">Total: 0</p>
        </div>
      </div>
    </div>
  </th:block>
  <th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      (function () {
        var input = document.getElementById('orderSearchInput');
        var btn = document.getElementById('orderSearchBtn');
        var table = document.querySelector('.data-table .table tbody');
        if (!input || !table) return;

        function filterRows() {
          var q = (input.value || '').trim().toLowerCase();
          var rows = table.querySelectorAll('tr');
          rows.forEach(function (tr) {
            var orderId = (tr.cells[0] && tr.cells[0].textContent) ? tr.cells[0].textContent.trim().toLowerCase() : '';
            var userCell = tr.cells[1];
            var userText = userCell ? userCell.textContent.replace(/\s+/g, ' ').trim().toLowerCase() : '';
            var match = !q || orderId.indexOf(q) !== -1 || userText.indexOf(q) !== -1;
            tr.style.display = match ? '' : 'none';
          });
        }

        input.addEventListener('input', filterRows);
        input.addEventListener('keyup', function (e) { if (e.key === 'Enter') filterRows(); });
        if (btn) btn.addEventListener('click', filterRows);
      })();
    </script>
  </th:block>

</html>
