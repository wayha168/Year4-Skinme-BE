<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  lang="en"
  th:replace="~{app :: layout(~{::main}, ~{::style}, ~{::script})}"
>
  <head>
    <th:block th:fragment="style">
      <link rel="stylesheet" href="/css/common.css" />
      <link rel="stylesheet" href="/css/tables.css" />
      <style>
        .pos-page { padding: 1rem; background: #f8f9fa; min-height: 100vh; }
        .pos-header-meta {
          background: #fff;
          border-radius: 12px;
          padding: 1rem 1.25rem;
          margin-bottom: 1rem;
          border: 1px solid #e5e7eb;
          display: flex;
          flex-wrap: wrap;
          gap: 1.5rem;
          align-items: center;
        }
        .pos-layout {
          display: grid;
          grid-template-columns: 1fr 380px;
          gap: 1rem;
          align-items: start;
        }
        @media (max-width: 1100px) {
          .pos-layout { grid-template-columns: 1fr; }
        }
        .pos-panel {
          background: #fff;
          border-radius: 12px;
          border: 1px solid #e5e7eb;
          padding: 1rem;
        }
        .pos-panel h6 {
          font-weight: 600;
          color: #334155;
          margin-bottom: 0.75rem;
        }
        .barcode-row {
          display: flex;
          gap: 0.5rem;
          margin-bottom: 1rem;
        }
        .barcode-row input { flex: 1; }
        .product-grid {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
          gap: 0.75rem;
          max-height: 52vh;
          overflow-y: auto;
        }
        .product-tile {
          border: 1px solid #e5e7eb;
          border-radius: 10px;
          padding: 0.65rem;
          cursor: pointer;
          transition: border-color 0.15s, box-shadow 0.15s;
          text-align: left;
          background: #fff;
          display: grid;
          gap: 0.55rem;
        }
        .product-tile:hover {
          border-color: #c9a86c;
          box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .product-tile img {
          width: 100%;
          aspect-ratio: 1 / 1;
          object-fit: cover;
          border-radius: 8px;
          background: #f8f9fa;
        }
        .product-tile .name {
          font-size: 0.82rem;
          font-weight: 600;
          color: #111827;
          line-height: 1.3;
          margin-bottom: 0;
        }
        .product-tile .price { color: #059669; font-weight: 700; font-size: 0.85rem; }
        .product-tile .stock { font-size: 0.7rem; color: #6b7280; }
        .cart-table { font-size: 0.875rem; }
        .cart-table td, .cart-table th { vertical-align: middle; }
        .btn-qty {
          min-width: 2.1rem;
          line-height: 1.1;
          padding: 0.35rem 0.4rem;
        }
        .pos-totals {
          background: #f8fafc;
          border-radius: 10px;
          padding: 1rem;
          margin: 1rem 0;
        }
        .pos-totals .row-line {
          display: flex;
          justify-content: space-between;
          margin-bottom: 0.35rem;
          color: #64748b;
          font-size: 0.9rem;
        }
        .pos-totals .grand {
          font-size: 1.35rem;
          font-weight: 700;
          color: #111827;
          border-top: 1px solid #e2e8f0;
          padding-top: 0.5rem;
          margin-top: 0.5rem;
        }
        .pay-btns {
          display: grid;
          grid-template-columns: 1fr 1fr 1fr;
          gap: 0.5rem;
        }
        .pay-btns .btn { font-size: 0.8rem; padding: 0.6rem 0.4rem; }
        .receipt-md {
          font-family: ui-monospace, monospace;
          font-size: 0.8rem;
          white-space: pre-wrap;
          background: #f8fafc;
          border: 1px solid #e2e8f0;
          border-radius: 8px;
          padding: 1rem;
          max-height: 400px;
          overflow-y: auto;
        }
        .receipt-render h1 { font-size: 1.25rem; }
        .receipt-render table { width: 100%; font-size: 0.85rem; }
        .khqr-box img { max-width: 220px; display: block; margin: 0 auto; }
        .khqr-status {
          border: 1px solid #dbeafe;
          background: #eff6ff;
          color: #1e3a8a;
          border-radius: 8px;
          padding: 0.65rem;
          margin-top: 0.75rem;
          font-size: 0.85rem;
        }
        .khqr-status.success { border-color: #bbf7d0; background: #f0fdf4; color: #166534; }
        .khqr-status.error { border-color: #fecaca; background: #fef2f2; color: #991b1b; }
        .pos-search { margin-bottom: 0.75rem; }
      </style>
    </th:block>
    <title th:text="${pageTitle ?: 'Point of Sale'}">Point of Sale</title>
  </head>
  <body>
    <th:block th:fragment="main">
      <div class="pos-page">
        <div th:replace="~{components/page-header :: page-header}" th:with="pageIcon='bi-shop'"></div>

        <div class="pos-header-meta">
          <div>
            <strong th:text="${posShopName}">SkinMe Store</strong>
            <div class="text-muted small" th:text="${posShopAddress}">Address</div>
          </div>
          <div>
            <span class="text-muted small">Cashier</span>
            <div class="fw-semibold" th:text="${cashierName}">Admin</div>
          </div>
          <div>
          </div>
        </div>

        <div class="pos-layout">
          <div class="pos-panel">
            <h6><i class="bi bi-upc-scan me-1"></i> Scan or select products</h6>
            <div class="barcode-row">
              <input type="text" id="barcodeInput" class="form-control" placeholder="Scan barcode or type and press Enter" autocomplete="off" />
              <button type="button" class="btn btn-primary" id="btnScan"><i class="bi bi-search"></i></button>
            </div>
            <input type="search" id="productSearch" class="form-control form-control-sm pos-search" placeholder="Search products..." />
            <div id="productGrid" class="product-grid">
              <p class="text-muted small">Loading products...</p>
            </div>
          </div>

          <div class="pos-panel">
            <h6><i class="bi bi-cart3 me-1"></i> Cart</h6>
            <div class="table-responsive">
              <table class="table table-sm cart-table mb-0">
                <thead>
                  <tr>
                    <th>Item</th>
                    <th style="width:70px">Qty</th>
                    <th style="width:70px">Total</th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="cartBody">
                  <tr id="cartEmpty"><td colspan="4" class="text-muted text-center py-3">Cart is empty</td></tr>
                </tbody>
              </table>
            </div>
            <div class="pos-totals">
              <div class="row-line"><span>Subtotal</span><span id="lblSubtotal">$0.00</span></div>
              <div class="row-line"><span>Delivery</span><span>$0.00 <small>(pickup)</small></span></div>
              <div class="row-line grand"><span>Total</span><span id="lblTotal">$0.00</span></div>
            </div>
            <div class="pay-btns mb-2">
              <button type="button" class="btn btn-success" id="btnPayCash" disabled><i class="bi bi-cash"></i> Cash</button>
              <button type="button" class="btn btn-primary" id="btnPayCard" disabled><i class="bi bi-credit-card"></i> Card</button>
              <button type="button" class="btn btn-dark" id="btnPayKhqr" disabled><i class="bi bi-qr-code"></i> KHQR</button>
            </div>
            <button type="button" class="btn btn-outline-secondary btn-sm w-100" id="btnClearCart">Clear cart</button>
          </div>
        </div>
      </div>

      <!-- Card modal -->
      <div class="modal fade" id="cardModal" tabindex="-1">
        <div class="modal-dialog modal-sm">
          <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Card payment</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
              <label class="form-label small">Last 4 digits (optional)</label>
              <input type="text" id="cardLast4" class="form-control" maxlength="4" placeholder="1234" />
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
              <button type="button" class="btn btn-primary" id="btnConfirmCard">Confirm card payment</button>
            </div>
          </div>
        </div>
      </div>

      <!-- KHQR modal -->
      <div class="modal fade" id="khqrModal" tabindex="-1">
        <div class="modal-dialog">
          <div class="modal-content">
            <div class="modal-header"><h5 class="modal-title">Scan KHQR to pay</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body text-center khqr-box">
              <div id="khqrLoading" class="text-muted">Generating QR...</div>
              <img id="khqrImage" alt="KHQR" style="display:none" />
              <p class="small text-muted mt-2" id="khqrAmount"></p>
              <button type="button" class="btn btn-success mt-2" id="btnVerifyKhqr">Check payment status</button>
              <div id="khqrStatus" class="khqr-status">Waiting for PayWay webhook after customer payment.</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Receipt modal -->
      <div class="modal fade" id="receiptModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
          <div class="modal-content">
            <div class="modal-header">
              <h5 class="modal-title">Receipt</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
              <div id="receiptRender" class="receipt-render mb-3"></div>
              <details>
                <summary class="small text-muted">Markdown source</summary>
                <pre class="receipt-md" id="receiptMarkdown"></pre>
              </details>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-outline-primary" id="btnPrintReceipt"><i class="bi bi-printer"></i> Print</button>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
            </div>
          </div>
        </div>
      </div>
    </th:block>

    <th:block th:fragment="script">
      <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
      <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
      <script th:inline="javascript">
        (function () {
          const API = (document.getElementById("appShell")?.getAttribute("data-api-prefix") || "/api/v1").replace(/\/$/, "");
          const CASHIER = /*[[${cashierName}]]*/ "Admin";
          const SHOP = /*[[${posShopName}]]*/ "SkinMe Store";
          const KHQR_RATE = /*[[${khqrUsdToKhrRate}]]*/ 4100;

          let products = [];
          let cart = [];
          let pendingOrderId = null;
          let calcDebounce = null;
          let paymentBusy = false;
          let khqrPollTimer = null;

          const $ = (id) => document.getElementById(id);

          function money(n) {
            return "$" + (Number(n) || 0).toFixed(2);
          }

          function cartPayload() {
            return { items: cart.map((c) => ({ productId: c.productId, quantity: c.quantity })) };
          }

          function localCartTotal() {
            return cart.reduce((sum, item) => sum + (Number(item.price) || 0) * item.quantity, 0);
          }

          function setKhqrStatus(message, type) {
            const el = $("khqrStatus");
            if (!el) return;
            el.textContent = message;
            el.className = "khqr-status" + (type ? " " + type : "");
          }

          function stopKhqrPolling() {
            if (khqrPollTimer) {
              clearInterval(khqrPollTimer);
              khqrPollTimer = null;
            }
          }

          function startKhqrPolling() {
            stopKhqrPolling();
            khqrPollTimer = setInterval(() => checkKhqrStatus(false), 4000);
          }

          async function api(path, opts) {
            const res = await fetch(API + path, {
              credentials: "same-origin",
              headers: { "Content-Type": "application/json", ...(opts?.headers || {}) },
              ...opts,
            });
            const json = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(json.message || "Request failed");
            return json.data != null ? json.data : json;
          }

          function renderProducts(filter) {
            const grid = $("productGrid");
            const q = (filter || "").toLowerCase().trim();
            const list = products.filter((p) => {
              if (!q) return true;
              return (p.name || "").toLowerCase().includes(q) || (p.barcode || "").toLowerCase().includes(q);
            });
            if (!list.length) {
              grid.innerHTML = '<p class="text-muted small">No products found</p>';
              return;
            }
            grid.innerHTML = list
              .map(
                (p) => {
                  const imgUrl = p.thumbnailUrl || 'https://via.placeholder.com/160?text=No+Image';
                  return `<button type="button" class="product-tile" data-id="${p.id}">
                    <img src="${escapeHtml(imgUrl)}" alt="${escapeHtml(p.name)}" onerror="this.src='https://via.placeholder.com/160?text=No+Image'" />
                    <div class="name">${escapeHtml(p.name)}</div>
                    <div class="price">${money(p.price)}</div>
                    <div class="stock">Stock: ${p.inventory ?? 0}${p.barcode ? " · " + escapeHtml(p.barcode) : ""}</div>
                  </button>`;
                }
              )
              .join("");
            grid.querySelectorAll(".product-tile").forEach((btn) => {
              btn.addEventListener("click", () => addToCart(Number(btn.dataset.id), 1));
            });
          }

          function escapeHtml(s) {
            const d = document.createElement("div");
            d.textContent = s || "";
            return d.innerHTML;
          }

          function addToCart(productId, qty) {
            const p = products.find((x) => x.id === productId);
            if (!p) return;
            pendingOrderId = null;
            const existing = cart.find((c) => c.productId === productId);
            if (existing) {
              existing.quantity += qty;
            } else {
              cart.push({
                productId: p.id,
                name: p.name,
                price: Number(p.price) || 0,
                quantity: qty,
                barcode: p.barcode,
              });
            }
            renderCart();
            recalculate();
          }

          function renderCart() {
            const body = $("cartBody");
            const empty = cart.length === 0;
            $("btnPayCash").disabled = empty;
            $("btnPayCard").disabled = empty;
            $("btnPayKhqr").disabled = empty;
            $("btnPayCash").disabled = empty || paymentBusy;
            $("btnPayCard").disabled = empty || paymentBusy;
            $("btnPayKhqr").disabled = empty || paymentBusy;
            if (empty) {
              body.innerHTML = '<tr id="cartEmpty"><td colspan="4" class="text-muted text-center py-3">Cart is empty</td></tr>';
              $("lblSubtotal").textContent = "$0.00";
              $("lblTotal").textContent = "$0.00";
              return;
            }
            body.innerHTML = cart
              .map(
                (c, i) =>
                  `<tr>
                    <td>${escapeHtml(c.name)}</td>
                   <td>
                    <div class="input-group input-group-sm d-flex flex-nowrap align-items-center" style="width: 110px;">
                      <button 
                        type="button" 
                        class="btn btn-outline-secondary btn-sm px-2 py-0 btn-qty" 
                        data-i="${i}" 
                        data-d="-1">
                        −
                      </button>

                      <span class="form-control text-center py-0 px-1 mx-1" style="min-width: 35px;">
                        ${c.quantity}
                      </span>

                      <button 
                        type="button" 
                        class="btn btn-outline-secondary btn-sm px-2 py-0 btn-qty" 
                        data-i="${i}" 
                        data-d="1">
                        +
                      </button>

                    </div>
                  </td>
                    <td>${money(c.price * c.quantity)}</td>
                    <td><button type="button" class="btn btn-sm btn-link text-danger btn-remove" data-i="${i}">×</button></td>
                  </tr>`
              )
              .join("");
            body.querySelectorAll(".btn-qty").forEach((b) => {
              b.addEventListener("click", () => {
                const i = Number(b.dataset.i);
                const d = Number(b.dataset.d);
                pendingOrderId = null;
                cart[i].quantity += d;
                if (cart[i].quantity <= 0) cart.splice(i, 1);
                renderCart();
                recalculate();
              });
            });
            body.querySelectorAll(".btn-remove").forEach((b) => {
              b.addEventListener("click", () => {
                pendingOrderId = null;
                cart.splice(Number(b.dataset.i), 1);
                renderCart();
                recalculate();
              });
            });
          }

          function recalculate() {
            clearTimeout(calcDebounce);
            if (!cart.length) return;
            calcDebounce = setTimeout(async () => {
              try {
                const data = await api("/admin/pos/calculate", {
                  method: "POST",
                  body: JSON.stringify(cartPayload()),
                });
                $("lblSubtotal").textContent = money(data.subtotal);
                $("lblTotal").textContent = money(data.total);
              } catch (e) {
                if (typeof showToast === "function") showToast(e.message, "error");
              }
            }, 200);
          }

          async function scanBarcode() {
            const code = $("barcodeInput").value.trim();
            if (!code) return;
            try {
              const data = await api("/products/scan?barcode=" + encodeURIComponent(code));
              const p = data;
              if (p && p.id) {
                addToCart(p.id, 1);
                $("barcodeInput").value = "";
                $("barcodeInput").focus();
                if (typeof showToast === "function") showToast("Added: " + (p.name || "product"), "success");
              }
            } catch (e) {
              if (typeof showToast === "function") showToast(e.message || "Product not found", "error");
            }
          }

          async function checkout() {
            if (pendingOrderId) {
              return { orderId: pendingOrderId, total: localCartTotal() };
            }
            const data = await api("/admin/pos/checkout", {
              method: "POST",
              body: JSON.stringify(cartPayload()),
            });
            pendingOrderId = data.orderId;
            return data;
          }

          function showReceipt(markdown) {
            $("receiptMarkdown").textContent = markdown || "";
            $("receiptRender").innerHTML = typeof marked !== "undefined" ? marked.parse(markdown || "") : "<pre>" + escapeHtml(markdown) + "</pre>";
            bootstrap.Modal.getOrCreateInstance($("receiptModal")).show();
          }

          async function payCash() {
            if (paymentBusy) return;
            paymentBusy = true;
            renderCart();
            try {
              await checkout();
              const result = await api("/admin/pos/pay/cash", {
                method: "POST",
                body: JSON.stringify({ orderId: pendingOrderId }),
              });
              cart = [];
              pendingOrderId = null;
              renderCart();
              showReceipt(result.receiptMarkdown);
              if (typeof showToast === "function") showToast("Cash payment complete", "success");
            } catch (e) {
              if (typeof showToast === "function") showToast(e.message, "error");
            } finally {
              paymentBusy = false;
              renderCart();
            }
          }

          async function payCard() {
            if (paymentBusy) return;
            paymentBusy = true;
            renderCart();
            try {
              await checkout();
              bootstrap.Modal.getOrCreateInstance($("cardModal")).show();
            } catch (e) {
              if (typeof showToast === "function") showToast(e.message, "error");
            } finally {
              paymentBusy = false;
              renderCart();
            }
          }

          async function confirmCard() {
            if (paymentBusy) return;
            paymentBusy = true;
            renderCart();
            try {
              const last4 = $("cardLast4").value.trim();
              const result = await api("/admin/pos/pay/card", {
                method: "POST",
                body: JSON.stringify({ orderId: pendingOrderId, cardLast4: last4 || null }),
              });
              bootstrap.Modal.getInstance($("cardModal"))?.hide();
              cart = [];
              pendingOrderId = null;
              renderCart();
              showReceipt(result.receiptMarkdown);
              if (typeof showToast === "function") showToast("Card payment complete", "success");
            } catch (e) {
              if (typeof showToast === "function") showToast(e.message, "error");
            } finally {
              paymentBusy = false;
              renderCart();
            }
          }

          async function payKhqr() {
            try {
              const chk = await checkout();
              const total = chk.total || chk.calculation?.total;
              $("khqrImage").style.display = "none";
              $("khqrLoading").style.display = "block";
              bootstrap.Modal.getOrCreateInstance($("khqrModal")).show();
              const khqr = await api(
                "/payment/generate-khqr?orderId=" + pendingOrderId + "&amount=" + total + "&currency=USD&gateway=aba"
              );
              $("khqrLoading").style.display = "none";
              setKhqrStatus("Waiting for PayWay webhook after customer payment.", "");
              startKhqrPolling();
              if (khqr.qrImage) {
                $("khqrImage").src = khqr.qrImage.startsWith("data:") ? khqr.qrImage : "data:image/png;base64," + khqr.qrImage;
                $("khqrImage").style.display = "block";
              }
              $("khqrAmount").textContent = "Amount: " + money(total) + " (≈ " + Math.round(Number(total) * KHQR_RATE) + " KHR)";
            } catch (e) {
              $("khqrLoading").textContent = e.message;
              setKhqrStatus(e.message, "error");
              if (typeof showToast === "function") showToast(e.message, "error");
            }
          }

          async function completeKhqrOrder() {
            await api("/admin/pos/complete-pickup/" + pendingOrderId, { method: "POST" });
            const rec = await api("/admin/pos/receipt/" + pendingOrderId);
            bootstrap.Modal.getInstance($("khqrModal"))?.hide();
            stopKhqrPolling();
            cart = [];
            const oid = pendingOrderId;
            pendingOrderId = null;
            renderCart();
            showReceipt(rec.receiptMarkdown);
            if (typeof showToast === "function") showToast("KHQR payment received - order #" + oid, "success");
          }

          async function checkKhqrStatus(showWaiting) {
            try {
              if (!pendingOrderId) return false;
              const status = await api("/payment/status/" + pendingOrderId);
              if (status.paid) {
                setKhqrStatus("Payment received from PayWay. Completing pickup...", "success");
                await completeKhqrOrder();
                return true;
              }
              if (showWaiting) {
                setKhqrStatus("Still waiting for PayWay webhook. Check again after the bank app confirms payment.", "");
              }
            } catch (e) {
              if (showWaiting) setKhqrStatus(e.message, "error");
              if (typeof showToast === "function") showToast(e.message, "error");
            }
            return false;
          }

          async function verifyKhqr() {
            return await checkKhqrStatus(true);
            try {
              await api("/payment/verify-khqr/" + pendingOrderId, { method: "POST" });
              await api("/admin/pos/complete-pickup/" + pendingOrderId, { method: "POST" });
              const rec = await api("/admin/pos/receipt/" + pendingOrderId);
              bootstrap.Modal.getInstance($("khqrModal"))?.hide();
              cart = [];
              const oid = pendingOrderId;
              pendingOrderId = null;
              renderCart();
              showReceipt(rec.receiptMarkdown);
              if (typeof showToast === "function") showToast("KHQR payment verified — order #" + oid, "success");
            } catch (e) {
              if (typeof showToast === "function") showToast(e.message, "error");
            }
          }

          async function loadProducts() {
            const data = await api("/admin/pos/products");
            products = Array.isArray(data) ? data : [];
            renderProducts();
          }

          function init() {
            $("btnScan").addEventListener("click", scanBarcode);
            $("barcodeInput").addEventListener("keydown", (e) => {
              if (e.key === "Enter") {
                e.preventDefault();
                scanBarcode();
              }
            });
            $("productSearch").addEventListener("input", (e) => renderProducts(e.target.value));
            $("btnPayCash").addEventListener("click", payCash);
            $("btnPayCard").addEventListener("click", payCard);
            $("btnConfirmCard").addEventListener("click", confirmCard);
            $("btnPayKhqr").addEventListener("click", payKhqr);
            $("btnVerifyKhqr").addEventListener("click", verifyKhqr);
            $("btnClearCart").addEventListener("click", () => {
              stopKhqrPolling();
              cart = [];
              pendingOrderId = null;
              renderCart();
            });
            $("khqrModal").addEventListener("hidden.bs.modal", stopKhqrPolling);
            $("btnPrintReceipt").addEventListener("click", () => {
              const w = window.open("", "_blank");
              w.document.write("<html><head><title>Receipt - " + SHOP + "</title></head><body>" + $("receiptRender").innerHTML + "</body></html>");
              w.document.close();
              w.print();
            });
            loadProducts().catch((e) => {
              $("productGrid").innerHTML = '<p class="text-danger small">' + escapeHtml(e.message) + "</p>";
            });
            $("barcodeInput").focus();
          }

          if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", init);
          } else {
            init();
          }
        })();
      </script>
    </th:block>
</html>
